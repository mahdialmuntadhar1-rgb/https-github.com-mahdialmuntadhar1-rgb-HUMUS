name = "iraq-compass-agent-runtime"
main = "worker/agent-runtime.ts"
compatibility_date = "2026-03-26"

[observability]
enabled = true

[limits]
cpu_ms = 30000

[triggers]
crons = ["*/10 * * * *"]

[[queues.producers]]
binding = "AGENT_TASK_QUEUE"
queue = "agent-task-queue"

[[queues.consumers]]
queue = "agent-task-queue"
max_batch_size = 10
max_batch_timeout = 30

[[durable_objects.bindings]]
name = "AGENT_STATE_DO"
class_name = "AgentStateDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentStateDO"]

[vars]
BACKOFF_BASE_SECONDS = "30"
BACKOFF_MAX_SECONDS = "1800"

[secrets]
required = ["SUPABASE_URL", "SUPABASE_SERVICE_ROLE_KEY", "ADMIN_SHARED_SECRET", "GOOGLE_PLACES_API_KEY"]
